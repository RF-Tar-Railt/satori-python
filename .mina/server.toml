includes = ["src/satori/server"]
raw-dependencies = ["satori-python-core<1.4.0,>=1.3.0"]

[project]
name = "satori-python-server"
dynamic = ["version"]
authors = [
  {name = "RF-Tar-Railt", email = "rf_tar_railt@qq.com"}
]
dependencies = [
    "loguru",
    "yarl",
    "aiohttp",
    "launart",
    "graia-amnesia[uvicorn]",
    "starlette[python-multipart]",
    "websockets",
    "python-multipart",
]
description = "Satori Protocol SDK for python, specify server part"
license = {text = "MIT"}
readme = "README.md"
requires-python = ">=3.10,<4.0"
classifiers = [
    "Typing :: Typed",
    "Development Status :: 5 - Production/Stable",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Programming Language :: Python :: 3.14",
    "Operating System :: OS Independent",
]

[project.urls]
homepage = "https://github.com/RF-Tar-Railt/satori-python"
repository = "https://github.com/RF-Tar-Railt/satori-python"
